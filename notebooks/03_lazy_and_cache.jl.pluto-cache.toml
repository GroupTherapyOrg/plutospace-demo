text_representation = """<div class=\"markdown\"><h3 id=\"Try-it-&#40;great-for-the-recording&#41;\">Try it &#40;great for the recording&#41;</h3>\n<p><strong>1 · Run-what&#39;s-stale.</strong> Everything is stale on first open. Click the <em>&quot;N cells are stale — run&quot;</em> notice, or hit <code>Ctrl/Cmd&#43;S</code>. Watch the chain go amber → running → green. ~5 s.</p>\n<p><strong>2 · Edit a leaf, keep the expensive work.</strong> Change the text inside <code>report</code> &#40;e.g. add an emoji&#41;. Only <code>report</code> and the cell under it go stale — <code>samples</code> and <code>smoothed</code> stay green. Run it: instant. <em>That&#39;s the point.</em></p>\n<p><strong>3 · Revert un-stales for free.</strong> Change <code>sample_size</code> to <code>2_000</code>. The whole chain goes stale. Now change it <strong>back</strong> to <code>1_000</code> — the stale marks vanish with <strong>no run</strong>, because the execution keys prove nothing actually changed.</p>\n<p><strong>4 · Outputs survive a restart.</strong> After running, stop the server and reopen this notebook. Every output is restored instantly from the sidecar — <em>except</em> <code>run_token</code>, which is <code>always_stale</code> and comes back marked stale.</p>\n<p><strong>5 · Edit from outside.</strong> With the notebook open, edit this <code>.jl</code> file in another editor &#40;or let an agent do it&#41;. The matching cell turns amber in your browser within a second — and nothing runs until you say so. See <code>04_agent_collab.jl</code>.</p>\n</div>"""
