text_representation = """<div class=\"markdown\"><h1 id=\"🟡-Lazy-mode:-the-two-file-reactive-model\">🟡 Lazy mode: the two-file reactive model</h1>\n<p>PlutoLand&#39;s default is <strong>lazy</strong>. Editing a cell — in the browser <em>or</em> on disk — marks it &#40;and everything downstream&#41; <strong>stale</strong> instead of running it. <em>You</em> decide when to run, and a run executes exactly the stale closure and nothing more.</p>\n<p>Two files hold the whole story:</p>\n<ol>\n<li><p><strong><code>03_lazy_and_cache.jl</code></strong> — the notebook &#40;this file&#41;. The source of truth for <em>code</em>.</p>\n</li>\n<li><p><strong><code>03_lazy_and_cache.jl.pluto-cache.toml</code></strong> — a plain-TOML sidecar holding every cell&#39;s <em>output</em> plus a content-addressed <strong>execution key</strong>. Delete it any time; it&#39;s just a cache.</p>\n</li>\n</ol>\n<p>The pipeline below has deliberately <strong>slow</strong> cells, so &quot;run only what&#39;s stale&quot; actually saves you something. Try the experiments at the bottom. 👇</p>\n</div>"""

