text_representation = """<div class=\"markdown\"><h1 id=\"🤝-One-notebook,-a-human-and-an-agent\">🤝 One notebook, a human and an agent</h1>\n<p>This notebook is built to be edited by <strong>someone who isn&#39;t in the browser</strong> — a coding agent, a script, you in another terminal — <em>while you watch it happen live</em>. No MCP, no plugin: just files, plain HTTP, and a tiny CLI.</p>\n<p>The whole agent surface is boring plumbing:</p>\n<ul>\n<li><p>every running server drops a connection file in <code>~/.local/state/pluto/servers/&lt;port&gt;.json</code> &#40;port &#43; access secret — the Jupyter idiom&#41;;</p>\n</li>\n<li><p>a plain HTTP API at <code>/api/v1/…</code>;</p>\n</li>\n<li><p>the <a href=\"https://github.com/GroupTherapyOrg/PlutoLand.jl/blob/main/bin/pluto-collab\"><code>pluto-collab</code></a> CLI &#40;just <code>curl</code> &#43; <code>sed</code>&#41;.</p>\n</li>\n</ul>\n<p>The dependency chain below is the playground. Read <code>AGENTS.md</code> in this workspace for the exact stanza an agent follows.</p>\n</div>"""

