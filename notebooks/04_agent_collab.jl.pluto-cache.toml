text_representation = """<div class=\"markdown\"><h3 id=\"The-loop-&#40;try-it-in-the-terminal-—-or-watch-an-agent-do-it&#41;\">The loop &#40;try it in the terminal — or watch an agent do it&#41;</h3>\n<p>From any terminal, with this notebook open in PlutoLand:</p>\n<pre><code class=\"language-sh\"># what&#39;s stale right now? &#40;per-cell: stale / cold / errored / output&#41;\npluto-collab status notebooks/04_agent_collab.jl\n\n# change a value the way an agent would — edit the file directly:\n#   target_temperature &#61; 26\n# the matching cell turns amber in the browser within ~1s. Nothing runs yet.\n\n# now run exactly what&#39;s outdated — you watch it go amber → running → green:\npluto-collab run notebooks/04_agent_collab.jl --stale\n\n# outputs are also readable straight from the sidecar, no tool needed:\ncat notebooks/04_agent_collab.jl.pluto-cache.toml</code></pre>\n<p>Runs requested over HTTP go through the <em>same</em> execution queue as your clicks — both sides see every run in real time. Expensive unrelated cells are never re-run; only the stale closure executes.</p>\n</div>"""
